# Local development — hot reload, no secrets needed
# Usage: docker compose up
#        docker compose exec app npm run db:push

services:
  app:
    container_name: chi-quantum-workflow-assistant
    build:
      context: .
      target: deps        # Use the deps stage (has all node_modules)
    volumes:
      - .:/app            # Mount source for hot reload
      - /app/node_modules # Keep container's node_modules (avoid Windows path issues)
    environment:
      NODE_ENV: development
      PORT: "5000"
      DATABASE_URL: postgres://app_user:devpassword@quantum-hr-db:5432/app_db
      VITE_BASE_PATH: /quantum-workflow-assistant/
    env_file:
      - path: .env
        required: false   # Optional — add API keys here for dev
    ports:
      - "5000:5000"
    networks:
      - default
      - caddy
    depends_on:
      quantum-hr-db:
        condition: service_healthy
    command: npm run dev

  quantum-hr-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: app_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5431:5431"       # Expose so you can connect with a local DB client
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  migrate:
    build:
      context: .
      target: deps          # a build stage that runs full npm ci
    command: npm run db:push
    environment:
      DATABASE_URL: postgres://app_user:devpassword@quantum-hr-db:5432/app_db
    depends_on:
      quantum-hr-db:
        condition: service_healthy
    profiles:
      - migrate             # won't run with normal `up`, only when called explicitly

volumes:
  postgres_dev_data:

networks:
  caddy:
    external: true
