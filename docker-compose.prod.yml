# Production deployment on a VM
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Before running, populate each file in ./secrets/ — see secrets/README.md

services:
  chi-quantum-workflow-assistant:
    build:
      context: .
      target: production
      args:
        VITE_BASE_PATH: /quantum-workflow-assistant
    environment:
      NODE_ENV: production
      PORT: "5000"
    secrets:
      - database_url
      - anthropic_api_key
    expose:
      - "5000"
    depends_on:
      chi-quantum-hr-db:
        condition: service_healthy
    restart: unless-stopped
    hostname: chi-quantum-workflow-assistant
    networks:
      - caddy
      - default

  chi-quantum-hr-db:
    image: postgres:16-alpine
    hostname: chi-quantum-hr-db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: app_db
    secrets:
      - postgres_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: builder
    entrypoint: ["sh", "-c", "export DATABASE_URL=$(cat /run/secrets/database_url) && npm run db:push"]
    secrets:
      - database_url
    depends_on:
      chi-quantum-hr-db:
        condition: service_healthy
    profiles:
      - migrate

secrets:
  database_url:
    file: ./secrets/database_url.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  postgres_prod_data:

networks:
  caddy:
    external: true